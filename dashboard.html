<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js" defer></script>
  <script src="dashboard.js" defer></script>
</head>
<body>

  <div class="container">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div>
        <span id="userEmail" class="small"></span>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Add Expense</h2>

    <label for="amount">Amount</label>
    <input id="amount" type="number" step="0.01" min="0" />

    <label for="category">Category</label>
    <input id="category" type="text" placeholder="Food, Travel, Rent..." />

    <label for="expense_date">Date</label>
    <input id="expense_date" type="date" />

    <label for="note">Note (optional)</label>
    <input id="note" type="text" placeholder="Any note" />

    <button id="addBtn" type="button">Add</button>
    <p id="msg"></p>
  </div>
       
      </div>

      <div class="card">
        <h2>This Month Summary</h2>
        <p><b>Total:</b> <span id="monthTotal">0</span></p>
      </div>
    </div>
<div class="card">
  <h2>Monthly Summary</h2>

  <table class="month-table">
    <thead>
      <tr>
        <th>Jan</th>
        <th>Feb</th>
        <th>Mar</th>
        <th>Apr</th>
        <th>May</th>
        <th>Jun</th>
        <th>Jul</th>
        <th>Aug</th>
        <th>Sep</th>
        <th>Oct</th>
        <th>Nov</th>
        <th>Dec</th>
      </tr>
    </thead>

    <tbody>
      <tr id="monthTotalsRow">
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
      </tr>
    </tbody>
  </table>

</div>

</body>
</html>
