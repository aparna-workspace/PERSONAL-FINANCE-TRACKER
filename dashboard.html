<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js" defer></script>
  <script src="dashboard.js" defer></script>
</head>
<body>

  <div class="container">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div>
        <span id="userEmail" class="small"></span>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Add Expense</h2>

        <form id="expenseForm">
          <label>Amount</label>
          <input type="number" id="amount" required step="0.01" min="0">

          <label>Category</label>
          <input type="text" id="category" required placeholder="Food, Travel, Rent...">

          <label>Date</label>
          <input type="date" id="expenseDate" required>

          <label>Note (optional)</label>
          <input type="text" id="note" placeholder="Any note">

          <button type="submit">Add</button>
        </form>

        <p class="msg" id="msg"></p>
      </div>

      <div class="card">
        <h2>This Month Summary</h2>
        <p><b>Total:</b> <span id="monthTotal">0</span></p>
      </div>
    </div>

    <div class="card">
      <h2>Recent Expenses</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Note</th>
            <th>Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expenseTableBody"></tbody>
      </table>
    </div>
  </div>

</body>
</html>
