<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js" defer></script>
  <script src="dashboard.js" defer></script>
</head>
<body>

  <div class="container">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div>
        <span id="userEmail" class="small"></span>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Add Expense</h2>

    <label for="amount">Amount</label>
    <input id="amount" type="number" step="0.01" min="0" />

    <label for="category">Category</label>
    <input id="category" type="text" placeholder="Food, Travel, Rent..." />

    <label for="expense_date">Date</label>
    <input id="expense_date" type="date" />

    <label for="note">Note (optional)</label>
    <input id="note" type="text" placeholder="Any note" />

    <button id="addBtn" type="button">Add</button>
    <p id="msg"></p>
  </div>
       
      </div>

      <div class="card">
        <h2>This Month Summary</h2>
        <p><b>Total:</b> <span id="monthTotal">0</span></p>
      </div>
    </div>

    <div class="card">
      <h2>Recent Expenses</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Note</th>
            <th>Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expenseTableBody"></tbody>
      </table>
    </div>
  </div>

</body>
</html>
